<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | SchoolEvHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand d-flex align-items-center" href="/">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
width="30" style="margin-right:8px;">

SchoolEvHub

</a>

</div>
</nav>

<!-- Login Section -->
<section class="login-section">

<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">

<div class="card login-card p-4">
<div class="card-body">

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show rounded-3 shadow-sm mb-4" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<h2 class="text-center mb-1">Login</h2>
<div id="schoolDisplay" class="text-center mb-4 text-primary fw-bold small">Direct System Access</div>

<form action="/login-user" method="POST">

<div class="mb-3">
<label class="form-label small fw-bold">EMAIL</label>
<input type="email" name="email" class="form-control" value="{{ email }}" required>
</div>

<div class="mb-3">
<label class="form-label small fw-bold">PASSWORD</label>
<div class="input-group">
    <input type="password" name="password" id="password" class="form-control" required>
    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password')">
        <i class="bi bi-eye"></i>
    </button>
</div>
</div>

<!-- Hidden school -->
<input type="hidden" name="school" id="schoolInput">

<button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-pill mt-3 shadow-sm">
Login
</button>

</form>

<p class="text-center mt-3">
Don't have an account? <a href="/register">Register</a>
</p>

</div>
</div>

</div>
</div>
</div>

<footer class="footer">
<div class="container text-center">
<p>© 2026 SchoolEvHub. All rights reserved.</p>
</div>
</footer>

</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- School Script -->
<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    const btn = input.nextElementSibling;
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
}

let school = localStorage.getItem("school");

if (school) {
    document.getElementById("schoolInput").value = school;
    document.getElementById("schoolDisplay").innerText = "Login for " + school;
    document.getElementById("schoolDisplay").classList.remove("text-muted");
    document.getElementById("schoolDisplay").classList.add("text-primary");
} else {
    document.getElementById("schoolDisplay").innerText = "Admin / System Access";
}
</script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>

</html>
