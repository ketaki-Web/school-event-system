<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | SchoolEvHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand d-flex align-items-center" href="/">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
width="30" style="margin-right:8px;">

SchoolEvHub

</a>

</div>
</nav>

<!-- Login Section -->
<section class="login-section">

<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">

<div class="card login-card">
<div class="card-body">

<form action="/login-user" method="POST">

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<!-- Hidden school -->
<input type="hidden" name="school" id="schoolInput">

<button type="submit" class="btn btn-primary w-100">
Login
</button>

</form>

<p class="text-center mt-3">
Don't have an account? <a href="/register">Register</a>
</p>

</div>
</div>

</div>
</div>
</div>

<footer class="footer">
<div class="container text-center">
<p>© 2026 SchoolEvHub. All rights reserved.</p>
</div>
</footer>

</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- School Script -->
<script>
let school = localStorage.getItem("school");

if (!school) {
    alert("Please select a school first!");
    window.location.href = "/select-school";
} else {
    document.getElementById("schoolInput").value = school;
}
</script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>

</html>
