<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Select School | SchoolEvHub</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand d-flex align-items-center" href="index.html">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
width="30" style="margin-right:8px;">

SchoolEvHub

</a>

</div>
</nav>


<main>

<!-- Page Heading -->

<section class="container text-center my-5">

<h2>Select Your School 🏫</h2>
<p class="text-muted">Choose your school to continue</p>

</section>


<!-- School Cards -->

<section class="container mb-5">

<div class="row g-4 justify-content-center">

<!-- School 1 -->
<div class="col-md-4" data-aos="zoom-in">
<div class="card event-card text-center p-4">

<h5>ADYPU School</h5>
<p class="text-muted">Pune</p>

<button class="btn btn-primary" onclick="selectSchool('ADYPU')">Select</button>

</div>
</div>


<!-- School 2 -->
<div class="col-md-4" data-aos="zoom-in">
<div class="card event-card text-center p-4">

<h5>TKV School</h5>
<p class="text-muted">Mumbai</p>

<button class="btn btn-primary" onclick="selectSchool('TKV')">Select</button>

</div>
</div>


<!-- School 3 -->
<div class="col-md-4" data-aos="zoom-in">
<div class="card event-card text-center p-4">

<h5>KP School</h5>
<p class="text-muted">Delhi</p>

<button class="btn btn-primary" onclick="selectSchool('KP')">Select</button>

</div>
</div>

</div>

</section>

</main>


<!-- Footer -->

<footer class="footer">

<div class="container text-center">
<p>© 2026 SchoolEvHub. All rights reserved.</p>
</div>

</footer>


<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- AOS Animation -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

<script>
function selectSchool(school){
    console.log("Selected school:", school);   // debug
    localStorage.setItem("school", school);    // overwrite always
    window.location.href = "/login";
}
</script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>

</html>
