<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Suggest Event | SchoolEvHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
<div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand d-flex align-items-center" href="/student">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" width="30" style="margin-right:8px;">
        SchoolEvHub
    </a>
    <a href="/logout" class="btn btn-outline-danger btn-sm px-3">Logout</a>
</div>
</nav>

<!-- Header -->
<section class="container my-4">
<h2>Suggest a New Event</h2>
<p class="text-muted">Students can suggest ideas for new school events.</p>
</section>

<!-- FORM -->
<section class="container mb-5">

<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card shadow-sm">
<div class="card-body">

<form action="/submit-suggestion" method="POST">

<div class="mb-3">
<label class="form-label">Event Title</label>
<input type="text" name="title" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Category</label>
<select name="category" class="form-control">
<option>Sports</option>
<option>Cultural</option>
<option>Technical</option>
<option>Music</option>
<option>Dance</option>
<option>Other</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Event Description</label>
<textarea name="description" class="form-control" rows="4" required></textarea>
</div>

<div class="mb-3">
<label class="form-label">Suggested Location</label>
<input type="text" name="location" class="form-control">
</div>

<button type="submit" class="btn btn-primary w-100">
Submit Suggestion
</button>

</form>

</div>
</div>

</div>
</div>

</section>

<!-- Footer -->
<footer class="footer">
<div class="container text-center">
<p>© 2026 SchoolEvHub. All rights reserved.</p>
</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
