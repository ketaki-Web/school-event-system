<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Event | SchoolEvHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand d-flex align-items-center" href="/">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
width="30" style="margin-right:8px;">
SchoolEvHub
</a>

</div>
</nav>

<!-- Header -->
<section class="container my-4">
<h2>Create New Event</h2>
<p class="text-muted">Teachers can add new school events here.</p>
</section>

<!-- Form -->
<section class="container mb-5">
<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card shadow-sm">
<div class="card-body">

<form action="/add-event" method="POST">

<input type="hidden" name="school" id="schoolInput">

<div class="mb-3">
<label class="form-label">Event Title</label>
<input type="text" name="title" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Date</label>
<input type="date" name="date" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Location</label>
<input type="text" name="location" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea name="description" class="form-control" rows="4" required></textarea>
</div>

<button type="submit" class="btn btn-primary w-100">
Create Event
</button>

</form>

</div>
</div>

</div>
</div>
</section>

<!-- Footer -->
<footer class="footer">
<div class="container text-center">
<p>© 2026 SchoolEvHub. All rights reserved.</p>
</div>
</footer>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- School Script -->
<script>
document.getElementById("schoolInput").value = localStorage.getItem("school");
</script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>

</html>
