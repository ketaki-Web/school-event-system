<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Browse Events | SchoolEvHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand d-flex align-items-center" href="/student">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" width="30" style="margin-right:8px;">
        SchoolEvHub
    </a>
    <a href="/logout" class="btn btn-outline-danger btn-sm px-3">Logout</a>
</div>
</nav>

<div class="container my-5">

<h2 class="mb-4">Browse Events</h2>

<div class="row g-3">

{% for event in events %}

<div class="col-md-6">
<div class="card event-card h-100">
<div class="card-body">

<h5>{{ event[1] }}</h5>

<p>
📅 {{ event[3] }} <br>
📍 {{ event[4] }}
</p>

<p>{{ event[2] }}</p>

<a href="/event-details/{{ event[0] }}" class="btn btn-primary w-100">
Register
</a>

</div>
</div>
</div>

{% endfor %}

</div>

</div>

<!-- Footer -->
<footer class="footer">
<div class="container text-center">
<p>© 2026 SchoolEvHub. All rights reserved.</p>
</div>
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
