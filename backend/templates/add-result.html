<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Publish Result | SchoolEvHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand d-flex align-items-center" href="/teacher">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
width="30" style="margin-right:8px;">

SchoolEvHub | ABC School

</a>
</div>
</nav>

<!-- Header -->
<section class="container my-4">
<h2>Publish Event Result</h2>
<p class="text-muted">Add winners of the event</p>
</section>

<!-- Form Section -->
<section class="container mb-5">

<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card shadow-sm">
<div class="card-body">

<form action="/add-result" method="POST">

<input type="hidden" name="school" id="schoolInput">

<div class="mb-3">
<label>Event Name</label>
<input type="text" name="event_name" class="form-control" required>
</div>

<div class="mb-3">
<label>Winner Name</label>
<input type="text" name="winner_name" class="form-control" required>
</div>

<div class="mb-3">
<label>Position</label>
<select name="position" class="form-control">
<option>1st</option>
<option>2nd</option>
<option>3rd</option>
</select>
</div>

<button type="submit" class="btn btn-primary w-100">
Publish Result
</button>

</form>

</div>
</div>

</div>
</div>

</section>

<!-- Footer -->
<footer class="footer">
<div class="container text-center">
<p>© 2026 SchoolEvHub. All rights reserved.</p>
</div>
</footer>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">

<div id="resultToast" class="toast align-items-center text-bg-success border-0">

<div class="d-flex">

<div class="toast-body">
🏆 Result published successfully!
</div>

<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

</div>

</div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/script.js"></script>

<script>
document.getElementById("schoolInput").value = localStorage.getItem("school");
</script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
