<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Events | SchoolEvHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand d-flex align-items-center" href="/teacher">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
width="30" style="margin-right:8px;">
SchoolEvHub
</a>

</div>
</nav>

<!-- PAGE TITLE -->
<div class="container my-4">
<h3>Manage Events</h3>
</div>

<!-- EVENTS -->
<div class="container">

<div class="row g-3">

{% for e in events %}

<div class="col-md-6">
<div class="card event-card h-100">
<div class="card-body">

<h5>{{ e[1] }}</h5>

<p>
📅 {{ e[3] }}
</p>

<p>
📍 {{ e[4] }}
</p>

<p class="text-muted">
{{ e[2] }}
</p>

<div class="d-flex gap-2">

<a href="/edit-event/{{ e[0] }}" class="btn btn-outline-primary btn-sm w-50">
Edit
</a>

<a href="/delete-event/{{ e[0] }}"
class="btn btn-outline-danger btn-sm w-50"
onclick="return confirm('Delete this event?')">
Delete
</a>

</div>

</div>
</div>
</div>

{% endfor %}

</div>

</div>

<!-- FOOTER -->
<footer class="footer mt-5">
<div class="container text-center">
<p>© 2026 SchoolEvHub. All rights reserved.</p>
</div>
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
