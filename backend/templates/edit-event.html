<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Event | SchoolEvHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand d-flex align-items-center" href="index.html">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
width="30" style="margin-right:8px;">

SchoolEvHub | ABC School

</a>

</div>
</nav>


<main>

<section class="container my-4">

<h2>Edit Event</h2>
<p class="text-muted">Update event details</p>

</section>


<section class="container mb-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-sm">

<div class="card-body">

<form action="/update-event/{{ event[0] }}" method="POST">

<div class="mb-3">
<label>Event Name</label>
<input type="text" name="title" class="form-control" value="{{ event[1] }}">
</div>

<div class="mb-3">
<label>Date</label>
<input type="date" name="date" class="form-control" value="{{ event[3] }}">
</div>

<div class="mb-3">
<label>Location</label>
<input type="text" name="location" class="form-control" value="{{ event[4] }}">
</div>

<div class="mb-3">
<label>Description</label>
<textarea name="description" class="form-control">{{ event[2] }}</textarea>
</div>

<button type="submit" class="btn btn-success w-100">Update Event</button>

</form>

</div>

</div>

</div>

</div>

</section>

</main>


<!-- Update Toast -->

<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">

<div id="updateToast" class="toast align-items-center text-bg-success border-0">

<div class="d-flex">

<div class="toast-body">
✅ Event updated successfully!
</div>

<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>
</body>

</html>
