<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registrations | SchoolEvHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="/teacher">SchoolEvHub</a>
</div>
</nav>

<div class="container my-5">

<h3 class="mb-4">Student Registrations</h3>

<table class="table table-bordered table-hover">

<thead class="table-dark">
<tr>
<th>Event</th>
<th>Student</th>
<th>Type</th>
<th>Group Name</th>
<th>Members</th>
</tr>
</thead>

<tbody>

{% for r in registrations %}
<tr>
<td>{{ r[0] }}</td>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td>{{ r[4] }}</td>
</tr>
{% else %}
<tr>
    <td colspan="5" class="text-center text-muted py-4">No student registrations found for your school yet.</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
