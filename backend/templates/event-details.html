<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Event Details | SchoolEvHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand d-flex align-items-center" href="/student">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
width="30" style="margin-right:8px;">
SchoolEvHub
</a>

<a class="btn btn-outline-light btn-sm" href="/student">Dashboard</a>

</div>
</nav>

<!-- EVENT DETAILS -->
<section class="container my-5">

<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card shadow-sm">
<div class="card-body">

{% if event %}

<h2 class="mb-3">{{ event[1] }}</h2>

<p class="text-muted">
📅 {{ event[3] }} <br>
📍 {{ event[4] }}
</p>

<p class="mb-4">{{ event[2] }}</p>

<!-- REGISTER FORM -->
<form action="/register-event" method="POST">

<input type="hidden" name="event_id" value="{{ event_id }}">


<div class="mb-3">
<label class="form-label">Select Type</label>
<select name="type" class="form-control" onchange="toggleFields(this.value)" required>
<option value="">Choose</option>
<option value="individual">Individual</option>
<option value="group">Group</option>
</select>
</div>

<!-- Individual -->
<div id="individualFields" style="display:none;">
<div class="mb-3">
<label>Your Name</label>
<input type="text" name="name" id="nameField" class="form-control">
</div>
</div>

<!-- Group -->
<div id="groupFields" style="display:none;">
<div class="mb-3">
<label>Group Name</label>
<input type="text" name="group_name" id="groupName" class="form-control">
</div>

<div class="mb-3">
<label>Members (comma separated)</label>
<input type="text" name="members" id="membersField" class="form-control">
</div>
</div>

<button type="submit" class="btn btn-success w-100 mt-2">
Register for Event
</button>

</form>

{% else %}

<h3 class="text-center text-danger">Event not found ❌</h3>

{% endif %}

</div>
</div>

</div>
</div>

</section>

<!-- FOOTER -->
<footer class="footer">
<div class="container text-center">
<p>© 2026 SchoolEvHub. All rights reserved.</p>
</div>
</footer>

<script>
function toggleFields(type){
    document.getElementById("individualFields").style.display = "none";
    document.getElementById("groupFields").style.display = "none";

    if(type === "individual"){
        document.getElementById("individualFields").style.display = "block";
    }
    else if(type === "group"){
        document.getElementById("groupFields").style.display = "block";
    }
}
</script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
